<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Clicker Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .score-display {
            font-size: 3em;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }
        
        .click-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .click-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }
        
        .click-button:active {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .click-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            animation: ripple 0.6s ease-out;
        }
        
        @keyframes ripple {
            from {
                width: 0;
                height: 0;
                opacity: 1;
            }
            to {
                width: 100px;
                height: 100px;
                opacity: 0;
            }
        }
        
        .upgrades {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: flex-start;
            overflow-x: auto;
            padding: 10px;
            max-width: 100%;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }
        
        .upgrades::-webkit-scrollbar {
            height: 8px;
        }
        
        .upgrades::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        
        .upgrades::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
        
        .upgrades::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        .upgrade-container {
            display: flex;
            gap: 20px;
            padding: 10px 0;
            overflow-x: auto;
            max-width: 100%;
        }
        
        .upgrade-btn {
            padding: 15px 25px;
            background: linear-gradient(145deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            min-width: 180px;
            flex-shrink: 1;
            max-width: 180px;
        }
        
        .upgrade-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats {
            margin-top: 20px;
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 1.5em;
            pointer-events: none;
            animation: float 1s ease-out forwards;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        @keyframes float {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(-50px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍪 Cookie Clicker 🍪</h1>
        
        <div class="score-display">
            Cookies: <span id="score">0</span>
        </div>
        
        <button class="click-button" id="clickBtn">
            Click Me!
        </button>
        
        <div class="stats">
            <div>Per Click: <span id="perClick">1</span> cookie</div>
            <div>Per Second: <span id="perSecond">0</span> cookies</div>
        </div>
        
        <div class="upgrades">
            <div class="upgrade-container">
                <button class="upgrade-btn" id="upgrade1">
                    Better Click (10 cookies)<br>
                    +1 per click
                </button>
                <button class="upgrade-btn" id="upgrade2">
                    Auto Clicker (50 cookies)<br>
                    +1 per second
                </button>
                <button class="upgrade-btn" id="upgrade3">
                    Super Click (100 cookies)<br>
                    +5 per click
                </button>
                <button class="upgrade-btn" id="upgrade4">
                    Cookie Farm (500 cookies)<br>
                    +10 per second
                </button>
                <button class="upgrade-btn" id="upgrade5">
                    Golden Touch (1000 cookies)<br>
                    +20 per click
                </button>
                <button class="upgrade-btn" id="upgrade6">
                    Cookie Factory (2000 cookies)<br>
                    +50 per second
                </button>
                <button class="upgrade-btn" id="upgrade7">
                    Magic Cursor (5000 cookies)<br>
                    +100 per click
                </button>
                <button class="upgrade-btn" id="upgrade8">
                    Cookie Empire (10000 cookies)<br>
                    +200 per second
                </button>
                <button class="upgrade-btn" id="upgrade9">
                    Quantum Click (25000 cookies)<br>
                    +500 per click
                </button>
                <button class="upgrade-btn" id="upgrade10">
                    Time Machine (50000 cookies)<br>
                    +1000 per second
                </button>
                <button class="upgrade-btn" id="upgrade11">
                    Divine Touch (100000 cookies)<br>
                    +2500 per click
                </button>
                <button class="upgrade-btn" id="upgrade12">
                    Cookie Galaxy (250000 cookies)<br>
                    +5000 per second
                </button>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let perClick = 1;
        let perSecond = 0;
        
        const scoreElement = document.getElementById('score');
        const perClickElement = document.getElementById('perClick');
        const perSecondElement = document.getElementById('perSecond');
        const clickBtn = document.getElementById('clickBtn');
        
        // Upgrade buttons
        const upgrade1 = document.getElementById('upgrade1');
        const upgrade2 = document.getElementById('upgrade2');
        const upgrade3 = document.getElementById('upgrade3');
        const upgrade4 = document.getElementById('upgrade4');
        const upgrade5 = document.getElementById('upgrade5');
        const upgrade6 = document.getElementById('upgrade6');
        const upgrade7 = document.getElementById('upgrade7');
        const upgrade8 = document.getElementById('upgrade8');
        const upgrade9 = document.getElementById('upgrade9');
        const upgrade10 = document.getElementById('upgrade10');
        const upgrade11 = document.getElementById('upgrade11');
        const upgrade12 = document.getElementById('upgrade12');
        
        // Update display
        function updateDisplay() {
            scoreElement.textContent = Math.floor(score);
            perClickElement.textContent = perClick;
            perSecondElement.textContent = perSecond;
            
            // Update button states
            upgrade1.disabled = score < 10;
            upgrade2.disabled = score < 50;
            upgrade3.disabled = score < 100;
            upgrade4.disabled = score < 500;
            upgrade5.disabled = score < 1000;
            upgrade6.disabled = score < 2000;
            upgrade7.disabled = score < 5000;
            upgrade8.disabled = score < 10000;
            upgrade9.disabled = score < 25000;
            upgrade10.disabled = score < 50000;
            upgrade11.disabled = score < 100000;
            upgrade12.disabled = score < 250000;
        }
        
        // Click effect
        function createClickEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.style.left = (x - 50) + 'px';
            effect.style.top = (y - 50) + 'px';
            clickBtn.appendChild(effect);
            
            setTimeout(() => effect.remove(), 600);
        }
        
        // Floating text effect
        function createFloatingText(x, y, text) {
            const floatingText = document.createElement('div');
            floatingText.className = 'floating-text';
            floatingText.textContent = '+' + text;
            floatingText.style.left = x + 'px';
            floatingText.style.top = y + 'px';
            floatingText.style.color = '#ffeb3b';
            document.body.appendChild(floatingText);
            
            setTimeout(() => floatingText.remove(), 1000);
        }
        
        // Main click handler
        clickBtn.addEventListener('click', (e) => {
            score += perClick;
            updateDisplay();
            
            const rect = clickBtn.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            createClickEffect(x, y);
            createFloatingText(e.clientX, e.clientY, perClick);
        });
        
        // Upgrade handlers
        upgrade1.addEventListener('click', () => {
            if (score >= 10) {
                score -= 10;
                perClick += 1;
                updateDisplay();
            }
        });
        
        upgrade2.addEventListener('click', () => {
            if (score >= 50) {
                score -= 50;
                perSecond += 1;
                updateDisplay();
            }
        });
        
        upgrade3.addEventListener('click', () => {
            if (score >= 100) {
                score -= 100;
                perClick += 5;
                updateDisplay();
            }
        });
        
        upgrade4.addEventListener('click', () => {
            if (score >= 500) {
                score -= 500;
                perSecond += 10;
                updateDisplay();
            }
        });
        
        upgrade5.addEventListener('click', () => {
            if (score >= 1000) {
                score -= 1000;
                perClick += 20;
                updateDisplay();
            }
        });
        
        upgrade6.addEventListener('click', () => {
            if (score >= 2000) {
                score -= 2000;
                perSecond += 50;
                updateDisplay();
            }
        });
        
        upgrade7.addEventListener('click', () => {
            if (score >= 5000) {
                score -= 5000;
                perClick += 100;
                updateDisplay();
            }
        });
        
        upgrade8.addEventListener('click', () => {
            if (score >= 10000) {
                score -= 10000;
                perSecond += 200;
                updateDisplay();
            }
        });
        
        upgrade9.addEventListener('click', () => {
            if (score >= 25000) {
                score -= 25000;
                perClick += 500;
                updateDisplay();
            }
        });
        
        upgrade10.addEventListener('click', () => {
            if (score >= 50000) {
                score -= 50000;
                perSecond += 1000;
                updateDisplay();
            }
        });
        
        upgrade11.addEventListener('click', () => {
            if (score >= 100000) {
                score -= 100000;
                perClick += 2500;
                updateDisplay();
            }
        });
        
        upgrade12.addEventListener('click', () => {
            if (score >= 250000) {
                score -= 250000;
                perSecond += 5000;
                updateDisplay();
            }
        });
        
        // Auto clicker
        setInterval(() => {
            if (perSecond > 0) {
                score += perSecond / 10; // Divide by 10 since interval is 100ms
                updateDisplay();
            }
        }, 100);
        
        // Initialize display
        updateDisplay();
        
        // Save game to localStorage
        setInterval(() => {
            localStorage.setItem('clickerGame', JSON.stringify({
                score: score,
                perClick: perClick,
                perSecond: perSecond
            }));
        }, 1000);
        
        // Load game from localStorage
        function loadGame() {
            const saved = localStorage.getItem('clickerGame');
            if (saved) {
                const data = JSON.parse(saved);
                score = data.score || 0;
                perClick = data.perClick || 1;
                perSecond = data.perSecond || 0;
                updateDisplay();
            }
        }
        
        // Load game on start
        loadGame();
    </script>
</body>
</html>
